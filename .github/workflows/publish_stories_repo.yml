# Copy standalone_audiobook_app/ → https://github.com/killamfkr/Stories
#
# Setup (once):
#   1. GitHub → Settings → Developer settings → Personal access tokens
#      Create a token with "Contents: Read and write" on killamfkr/Stories
#   2. PlayTorrioV2 repo → Settings → Secrets and variables → Actions
#      New secret: STORIES_PUSH_TOKEN = that token
#   3. Actions → "Publish Stories repo" → Run workflow

name: Publish Stories repo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate source folder
        run: test -d standalone_audiobook_app

      - name: Push standalone_audiobook_app to killamfkr/Stories
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          API_TOKEN_GITHUB: ${{ secrets.STORIES_PUSH_TOKEN }}
        with:
          source-directory: standalone_audiobook_app
          destination-github-username: killamfkr
          destination-repository-name: Stories
          user-email: github-actions[bot]@users.noreply.github.com
          user-name: github-actions[bot]
          target-branch: main
