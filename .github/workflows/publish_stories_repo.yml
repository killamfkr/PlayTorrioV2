# Copy standalone_audiobook_app/ → https://github.com/killamfkr/Stories
#
# Setup (once):
#   1. GitHub → Settings → Developer settings → Personal access tokens
#      Fine-grained on killamfkr/Stories: Contents Read and write
#      (Optional) Workflows Read and write — only if you enable "Include CI workflows"
#      Classic alternative: repo + workflow scopes
#   2. PlayTorrioV2 repo → Settings → Secrets and variables → Actions
#      New secret: STORIES_PUSH_TOKEN = that token
#   3. Actions → "Publish Stories repo" → Run workflow
#
# Works on an empty Stories repo or when republishing over an existing main branch.
# Each run replaces Stories/main with the current standalone_audiobook_app/ snapshot.

name: Publish Stories repo

on:
  workflow_dispatch:
    inputs:
      include_github_actions:
        description: 'Include .github/workflows (token needs workflow scope)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate source folder
        run: test -d standalone_audiobook_app

      - name: Prepare export (no generated android/ios/build)
        run: |
          rsync -a standalone_audiobook_app/ stories-export/
          rm -rf stories-export/.dart_tool \
                 stories-export/build \
                 stories-export/android \
                 stories-export/ios \
                 stories-export/.flutter-plugins-dependencies || true
          if [[ "${{ inputs.include_github_actions }}" != "true" ]]; then
            echo "Omitting .github/ (use include_github_actions=true + workflow scope to ship CI)"
            rm -rf stories-export/.github
          fi

      - name: Push to killamfkr/Stories (replaces main)
        env:
          STORIES_PUSH_TOKEN: ${{ secrets.STORIES_PUSH_TOKEN }}
        run: |
          if [[ -z "${STORIES_PUSH_TOKEN}" ]]; then
            echo "::error::Add STORIES_PUSH_TOKEN in PlayTorrioV2 → Settings → Secrets → Actions"
            exit 1
          fi
          cd stories-export
          git init -b main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "Publish Stories from PlayTorrioV2"
          git remote add origin "https://x-access-token:${STORIES_PUSH_TOKEN}@github.com/killamfkr/Stories.git"
          # Fresh history each run — force replaces remote main (mirror of PlayTorrioV2).
          git push --force origin main
