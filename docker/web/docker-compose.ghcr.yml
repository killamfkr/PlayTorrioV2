# Run pre-built image from GitHub Container Registry (no clone/build on the server).
# Requires the repo's "Docker Web (GHCR)" workflow to have run at least once on your fork.
#
# Default image is the upstream namespace; forks should set PLAYTORRIO_WEB_IMAGE to their GHCR image.
#
#   docker compose -f docker/web/docker-compose.ghcr.yml pull
#   docker compose -f docker/web/docker-compose.ghcr.yml up -d
#
# Or one line:
#   PLAYTORRIO_WEB_IMAGE=ghcr.io/youruser/playtorrio-web:latest docker compose -f docker/web/docker-compose.ghcr.yml up -d

services:
  playtorrio-web:
    image: ${PLAYTORRIO_WEB_IMAGE:-ghcr.io/killamfkr/playtorrio-web:latest}
    container_name: playtorrio-web
    ports:
      - "8089:80"
    restart: unless-stopped
