# Build release APK for Stories (standalone audiobook app).
# android/ is generated in CI via flutter create + tool/patch_android.sh.

name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: '3.41.0'

jobs:
  android-apk:
    name: Android release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Generate platform folders (android/ios)
        run: |
          flutter create . \
            --project-name audiobook_app \
            --org com.playtorrio.audiobook \
            --platforms=android,ios
          bash tool/patch_android.sh

      - run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Stories-Android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
